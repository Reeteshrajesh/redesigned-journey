[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_PUBLIC_SITE_URL = "https://finscann.com"
  NEXT_PUBLIC_GA_MEASUREMENT_ID = "G-8VSXF40K0E"
  NEXT_PUBLIC_GTM_ID = "GTM-5LNRW9B8"
  NEXT_PUBLIC_GOOGLE_ADSENSE_ID = "ca-pub-4434937912141944"

# Force HTTPS redirect (fix redirect chain issues)
[[redirects]]
  from = "http://finscann.com/*"
  to = "https://finscann.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.finscann.com/*"
  to = "https://finscann.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.finscann.com/*"
  to = "https://finscann.com/:splat"
  status = 301
  force = true


# Headers for security, SEO, and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"
    X-DNS-Prefetch-Control = "on"
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
